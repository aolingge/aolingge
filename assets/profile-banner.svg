<svg width="1400" height="320" viewBox="0 0 1400 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Aolinge GitHub profile cover</title>
  <desc id="desc">A restrained dark developer cover with a command line, repository nodes, and delivery workflow lines.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#090A0C"/>
      <stop offset="0.52" stop-color="#111111"/>
      <stop offset="1" stop-color="#16130F"/>
    </linearGradient>
    <linearGradient id="line" x1="170" y1="266" x2="1220" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F2EFE6" stop-opacity="0"/>
      <stop offset="0.18" stop-color="#D94A38"/>
      <stop offset="0.58" stop-color="#21A179"/>
      <stop offset="1" stop-color="#F2EFE6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="panel" x1="180" y1="88" x2="1220" y2="228" gradientUnits="userSpaceOnUse">
      <stop stop-color="#151515"/>
      <stop offset="1" stop-color="#1D1A16"/>
    </linearGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#F2EFE6" opacity="0.14"/>
    </pattern>
    <filter id="softShadow" x="-12%" y="-30%" width="124%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="1400" height="320" rx="26" fill="url(#bg)"/>
  <rect width="1400" height="320" rx="26" fill="url(#dots)" opacity="0.72"/>
  <path d="M124 256C314 175 466 187 648 122C816 62 1008 57 1276 136" stroke="url(#line)" stroke-width="2.5"/>
  <path d="M124 254C314 173 466 185 648 120C816 60 1008 55 1276 134" stroke="#F2EFE6" stroke-opacity="0.08" stroke-width="18" stroke-linecap="round"/>

  <g filter="url(#softShadow)">
    <rect x="178" y="76" width="1044" height="168" rx="22" fill="url(#panel)" stroke="#2B2925"/>
    <rect x="210" y="108" width="438" height="104" rx="14" fill="#0C0D0E" stroke="#2B2925"/>
    <rect x="686" y="108" width="184" height="104" rx="14" fill="#101111" stroke="#2B2925"/>
    <rect x="902" y="108" width="288" height="104" rx="14" fill="#101111" stroke="#2B2925"/>
  </g>

  <g font-family="Cascadia Mono, Consolas, monospace">
    <text x="238" y="145" fill="#F2EFE6" font-size="20" font-weight="700">$ aolinge</text>
    <text x="238" y="176" fill="#8F8A7E" font-size="18">ship small tools with calm systems</text>
    <rect x="238" y="193" width="246" height="3" rx="1.5" fill="#21A179"/>
    <rect x="494" y="193" width="78" height="3" rx="1.5" fill="#D94A38"/>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="1.3">
    <text x="722" y="143" fill="#8F8A7E">FOCUS</text>
    <text x="722" y="174" fill="#F2EFE6" font-size="18" letter-spacing="0">Agent safety</text>
    <text x="930" y="143" fill="#8F8A7E">STACK</text>
    <text x="930" y="174" fill="#F2EFE6" font-size="18" letter-spacing="0">TypeScript · Java · Python</text>
  </g>

  <g>
    <circle cx="286" cy="256" r="6" fill="#D94A38"/>
    <circle cx="538" cy="168" r="6" fill="#21A179"/>
    <circle cx="790" cy="96" r="6" fill="#F2EFE6"/>
    <circle cx="1118" cy="94" r="6" fill="#D94A38"/>
    <path d="M286 256L538 168L790 96L1118 94" stroke="#F2EFE6" stroke-width="1.5" stroke-opacity="0.28" stroke-dasharray="4 10"/>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" font-weight="700">
    <text x="178" y="52" fill="#F2EFE6" font-size="16" letter-spacing="2.8">AOLINGE</text>
    <text x="1124" y="272" fill="#8F8A7E" font-size="13" letter-spacing="1.8">CLEAN · REUSABLE · SHIPPABLE</text>
  </g>
</svg>
